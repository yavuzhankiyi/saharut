services:
  postgres:
    image: postgres:17
    container_name: saharut-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: saharut_db
      POSTGRES_USER: saharut_user
      POSTGRES_PASSWORD: saharut_dev_password

    ports:
      - "5433:5432"

    volumes:
      - saharut_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saharut_user -d saharut_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  saharut_postgres_data: